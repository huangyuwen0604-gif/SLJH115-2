<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣特權量表</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --mint:#2dd4bf;--yellow:#fbbf24;--coral:#fb7185;
  --purple:#a78bfa;--blue:#60a5fa;--green:#4ade80;
  --bg:#f0fdf9;--card:#fff;--text:#1e293b;
  --muted:#64748b;--border:#e2e8f0;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:.18;}
body::before{width:500px;height:500px;background:var(--mint);top:-100px;left:-100px;}
body::after{width:400px;height:400px;background:var(--purple);bottom:-80px;right:-80px;}

/* pages */
.page{position:relative;z-index:1;display:none;}
.page.active{display:block;}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(240,253,249,.92);backdrop-filter:blur(14px);border-bottom:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;}
.bar-track{flex:1;height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--mint),var(--blue));width:0%;transition:width .4s cubic-bezier(.4,0,.2,1);}
.bar-text{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;font-family:'Nunito',sans-serif;}
.ab{background:var(--mint);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;padding:4px 14px;border-radius:99px;white-space:nowrap;box-shadow:0 2px 8px rgba(45,212,191,.35);}

/* container */
.wrap{max-width:720px;margin:0 auto;padding:48px 20px 160px;}
.wrap-result{max-width:720px;margin:0 auto;padding:40px 20px 80px;}

/* hero */
.hero{text-align:center;margin-bottom:52px;animation:bounceIn .7s cubic-bezier(.36,.07,.19,.97) both;}
.hero-tag{display:inline-block;background:var(--yellow);color:#92400e;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;padding:5px 14px;border-radius:99px;margin-bottom:18px;transform:rotate(-1.5deg);}
h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(30px,6vw,50px);line-height:1.15;color:var(--text);margin-bottom:4px;}
.hl{color:var(--mint);position:relative;display:inline-block;}
.hl::after{content:'';position:absolute;left:0;bottom:2px;width:100%;height:6px;background:var(--yellow);border-radius:4px;z-index:-1;opacity:.65;}
.hero-sub{font-size:15px;color:var(--muted);margin-top:14px;line-height:1.85;max-width:460px;margin-left:auto;margin-right:auto;}

/* notice */
.notice{background:#fffbeb;border:2px solid #fde68a;border-radius:16px;padding:14px 18px;margin-bottom:36px;font-size:13.5px;color:#92400e;line-height:1.7;display:flex;gap:10px;align-items:flex-start;}
.notice-icon{font-size:20px;flex-shrink:0;margin-top:1px;}

/* category */
.category{margin-bottom:40px;opacity:0;transform:translateY(24px);animation:slideUp .55s ease forwards;}
.category:nth-child(1){animation-delay:.05s}.category:nth-child(2){animation-delay:.12s}
.category:nth-child(3){animation-delay:.19s}.category:nth-child(4){animation-delay:.26s}
.category:nth-child(5){animation-delay:.33s}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.cat-pill{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:5px 16px;border-radius:99px;border:2px solid transparent;}
.cat-count{font-size:12px;color:var(--muted);font-weight:500;margin-left:auto;font-family:'Nunito',sans-serif;}
.theme-mint  .cat-pill{background:#ccfbf1;color:#0f766e;border-color:#99f6e4;}
.theme-blue  .cat-pill{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe;}
.theme-coral .cat-pill{background:#ffe4e6;color:#be123c;border-color:#fecdd3;}
.theme-purple .cat-pill{background:#ede9fe;color:#6d28d9;border-color:#ddd6fe;}
.theme-yellow .cat-pill{background:#fef9c3;color:#92400e;border-color:#fde68a;}

/* items */
.item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:2px solid var(--border);border-radius:16px;margin-bottom:8px;cursor:pointer;transition:transform .15s ease,border-color .2s,background .2s,box-shadow .2s;user-select:none;-webkit-tap-highlight-color:transparent;}
.item:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07);}
.item:active{transform:scale(.98);}
.theme-mint  .item.checked{border-color:var(--mint);background:#f0fefa;box-shadow:0 4px 16px rgba(45,212,191,.15);}
.theme-blue  .item.checked{border-color:var(--blue);background:#eff6ff;box-shadow:0 4px 16px rgba(96,165,250,.15);}
.theme-coral .item.checked{border-color:var(--coral);background:#fff1f2;box-shadow:0 4px 16px rgba(251,113,133,.15);}
.theme-purple .item.checked{border-color:var(--purple);background:#f5f3ff;box-shadow:0 4px 16px rgba(167,139,250,.15);}
.theme-yellow .item.checked{border-color:var(--yellow);background:#fffbeb;box-shadow:0 4px 16px rgba(251,191,36,.15);}
.cb-wrap{width:26px;height:26px;flex-shrink:0;border-radius:8px;border:2.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.4,0,.2,1);background:#fff;}
.item.checked .cb-wrap{border-color:transparent;}
.theme-mint  .item.checked .cb-wrap{background:var(--mint);}
.theme-blue  .item.checked .cb-wrap{background:var(--blue);}
.theme-coral .item.checked .cb-wrap{background:var(--coral);}
.theme-purple .item.checked .cb-wrap{background:var(--purple);}
.theme-yellow .item.checked .cb-wrap{background:var(--yellow);}
.ck{width:14px;height:11px;opacity:0;transform:scale(.4) rotate(-10deg);transition:all .22s cubic-bezier(.4,0,.2,1);}
.item.checked .ck{opacity:1;transform:scale(1) rotate(0);}
.ck path{stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;}
.item-emoji{font-size:20px;flex-shrink:0;}
.item-text{flex:1;font-size:14.5px;color:#475569;line-height:1.6;transition:color .2s;}
.item.checked .item-text{color:var(--text);font-weight:500;}
.item-num{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#cbd5e1;flex-shrink:0;}
.item.checked .item-num{color:#94a3b8;}
.item.unanswered{animation:shake .4s ease;border-color:var(--coral)!important;background:#fff1f2!important;}

/* submit */
.submit-wrap{text-align:center;margin-top:40px;animation:slideUp .6s ease .5s both;}
.submit-btn{background:linear-gradient(135deg,var(--mint),var(--blue));color:#fff;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;padding:16px 52px;border-radius:99px;cursor:pointer;box-shadow:0 6px 24px rgba(45,212,191,.4);transition:transform .15s,box-shadow .15s;letter-spacing:.04em;}
.submit-btn:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(45,212,191,.5);}
.submit-btn:active{transform:scale(.97);}
.submit-hint{font-size:13px;color:var(--muted);margin-top:10px;}

/* reflection */
.reflection{margin-top:40px;background:linear-gradient(135deg,#f0fdf4,#eff6ff);border:2px dashed #bfdbfe;border-radius:20px;padding:24px 28px;font-size:14px;color:var(--muted);line-height:1.85;animation:slideUp .6s ease .5s both;}
.ref-tag{display:inline-block;background:var(--blue);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:.1em;padding:3px 10px;border-radius:99px;margin-bottom:10px;}

/* ══════════ RESULT PAGE ══════════ */
.score-hero{text-align:center;padding:44px 24px 36px;background:linear-gradient(135deg,#ecfdf5,#eff6ff);border-radius:28px;border:2px solid #bfdbfe;margin-bottom:28px;animation:bounceIn .7s cubic-bezier(.36,.07,.19,.97) both;}
.score-ring{width:110px;height:110px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--mint),var(--blue));display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(45,212,191,.4);}
.score-big{font-family:'Nunito',sans-serif;font-weight:900;font-size:44px;color:#fff;line-height:1;}
.score-of{font-size:13px;color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-weight:700;}
.band-name{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:var(--text);margin-bottom:8px;}
.band-desc-r{font-size:14px;color:var(--muted);line-height:1.8;max-width:480px;margin:0 auto 20px;}

.rsec{margin-bottom:24px;animation:slideUp .5s ease both;}
.rsec:nth-child(1){animation-delay:.1s}.rsec:nth-child(2){animation-delay:.18s}
.rsec:nth-child(3){animation-delay:.26s}.rsec:nth-child(4){animation-delay:.34s}
.sec-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.dot-b{width:8px;height:8px;border-radius:50%;display:inline-block;}

/* review grid */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ri{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-size:13px;}
.ri .re{font-size:15px;flex-shrink:0;}.ri .rt{flex:1;color:#475569;line-height:1.4;}.ri .rc{font-size:13px;flex-shrink:0;}
.ri.yes{border-color:#99f6e4;background:#f0fefa;}.ri.yes .rt{color:var(--text);}
.ri.no{border-color:var(--border);background:#f8fafc;opacity:.55;}
.ri.rev-yes{border-color:#fde68a;background:#fffbeb;}
.ri.rev-no{border-color:var(--border);background:#f8fafc;opacity:.55;}

/* reflect */
.reflect-card{background:#fff;border:2px solid var(--border);border-radius:20px;padding:20px 24px;}
.rq{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);line-height:1.7;}
.rq:last-child{border-bottom:none;padding-bottom:0;}
.qn{font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;min-width:26px;height:26px;border-radius:99px;background:linear-gradient(135deg,var(--mint),var(--blue));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}

/* confirm modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;display:none;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:24px;padding:36px;max-width:380px;width:90%;text-align:center;animation:bounceIn .4s ease;}
.modal h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;margin-bottom:8px;}
.modal p{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.modal-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--mint),var(--blue));color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;cursor:pointer;}
.modal-btn:active{opacity:.85;}

/* shared btns */
.page-btn{font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;padding:10px 24px;border-radius:99px;border:2px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .2s;}
.page-btn:hover{border-color:var(--coral);color:var(--coral);background:#fff1f2;}
.page-btn.primary{background:linear-gradient(135deg,var(--mint),var(--blue));color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(45,212,191,.35);}
.page-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,212,191,.45);}

/* animations */
@keyframes bounceIn{0%{opacity:0;transform:scale(.9) translateY(16px);}60%{transform:scale(1.02) translateY(-4px);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes popCheck{0%{transform:scale(1);}35%{transform:scale(.88);}65%{transform:scale(1.1);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.pop-anim{animation:popCheck .28s ease;}

@media(max-width:560px){
  .rgrid{grid-template-columns:1fr;}
  h1{font-size:28px;}
  .wrap{padding:32px 14px 140px;}
}
</style>
</head>
<body>

<!-- TOPBAR (quiz only) -->
<div class="topbar" id="topbar">
  <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  <div class="bar-text" id="barText">已勾選 0 項</div>
  <div class="ab" id="abBadge">✨ 0 分</div>
</div>

<!-- ════════ PAGE: QUIZ ════════ -->
<div id="pageQuiz" class="page active">
<div class="wrap">
  <div class="hero">
    <div class="hero-tag">🎓 情意教育工具</div>
    <h1>台灣<span class="hl">特權</span>量表</h1>
    <p class="hero-sub">在你 18 歲以前，有過哪些經歷？<br>符合就勾，不符合跳過，做完按送出 👀</p>
  </div>

  <div class="notice">
    <div class="notice-icon">💡</div>
    <div>勾選你<strong>曾經有過</strong>的經歷就好，不符合的題目不需要做任何動作。</div>
  </div>

  <div id="quizBody"></div>

  <div class="submit-wrap">
    <button class="submit-btn" onclick="openConfirm()">看我的結果 🎯</button>
    <div class="submit-hint">做完之後按這裡，不符合的題目不用管 😊</div>
  </div>

  <div class="reflection">
    <div class="ref-tag">💡 作答提醒</div>
    <p>沒有對錯，只有看見。誠實作答，才能真正認識自己的起點。</p>
  </div>
</div>
</div>

<!-- ════════ PAGE: RESULT ════════ -->
<div id="pageResult" class="page">
<div class="wrap-result">

  <div class="score-hero">
    <div class="score-ring">
      <div class="score-big" id="rScore">0</div>
      <div class="score-of">/ 20 分</div>
    </div>
    <div class="band-name" id="rBandName">—</div>
    <p class="band-desc-r" id="rBandDesc"></p>
  </div>

  <div class="rsec">
    <div class="sec-label"><span class="dot-b" style="background:var(--mint)"></span>你勾選的正向題</div>
    <div class="rgrid" id="posGrid"></div>
  </div>

  <div class="rsec">
    <div class="sec-label"><span class="dot-b" style="background:var(--yellow)"></span>這些你也有過嗎？</div>
    <div class="rgrid" id="revGrid"></div>
  </div>

  <div class="rsec">
    <div class="sec-label"><span class="dot-b" style="background:var(--purple)"></span>想一想 🤔</div>
    <div class="reflect-card" id="reflectCard"></div>
  </div>

  <div style="text-align:center;margin-top:32px;">
    <button class="page-btn" onclick="resetAll()">🔄 重新作答</button>
  </div>

</div>
</div>

<!-- CONFIRM SUBMIT MODAL -->
<div class="modal-bg" id="confirmBg">
  <div class="modal">
    <div style="font-size:40px;margin-bottom:12px;">🎯</div>
    <h2>確定要送出嗎？</h2>
    <p id="confirmMsg">你一共勾選了 <strong id="confirmCount">0</strong> 項。<br>送出後就會看到你的結果，無法再修改喔！</p>
    <button class="modal-btn" onclick="confirmSubmit()" style="margin-bottom:10px;">確定送出</button>
    <div><button class="page-btn" style="font-size:13px;" onclick="closeConfirm()">再想想 🤔</button></div>
  </div>
</div>

<script>
/* ══════════════════════════════
   DATA
══════════════════════════════ */
const cats = [
  {theme:'theme-mint',  icon:'🏠', name:'居住與空間', items:[
    {id:1,   e:'🛏️', t:'有自己的房間',          rev:false},

    {id:4,   e:'🏆', t:'參加過付費資優／競賽／外語檢定培訓班', rev:false},
    {id:5,   e:'🎵', t:'付費學過樂器、舞蹈或美術任一項一年以上', rev:false},
    {id:'R2',e:'📚', t:'曾因家裡沒錢，無法參加任何學校以外的才藝或補習', rev:true, rn:'教育資源匱乏'},

  {theme:'theme-coral', icon:'🎾', name:'休閒與體驗', items:[

  {theme:'theme-purple',icon:'🏡', name:'家庭條件', items:[

    {id:10,  e:'🎓', t:'家長都有大學畢業以上學歷',   rev:false},
    {id:11,  e:'🚗', t:'家裡有兩輛車以上',          rev:false},

  ]},
  {theme:'theme-yellow',icon:'✈️', name:'國際視野', items:[

    {id:16,  e:'🛫', t:'搭過商務艙以上艙等',        rev:false},
    {id:17,  e:'🏫', t:'家裡有幫你規劃出國讀書',    rev:false},
    {id:18,  e:'⛺', t:'參加過海外夏令營或冬令營',   rev:false},
    {id:19,  e:'🌐', t:'讀過國際學校或雙語私校',     rev:false},
    {id:20,  e:'🛂', t:'擁有雙重國籍、他國永久居留或長期居留權', rev:false},
    {id:'R6',e:'🗺️', t:'從來沒有離開過自己生長的縣市去旅遊或參觀', rev:true, rn:'視野受限'},
  ]},
];

const bands = [
  {min:0,  max:4,  name:'資源有限的起點 🌱', desc:'你在相對匱乏的環境中成長，每一步的前進都需要多付出許多力氣。能走到現在，你已經非常了不起。'},
  {min:5,  max:9,  name:'中等資源的起點 🌿', desc:'你擁有一些基本資源，但仍有許多機會是你靠自己努力爭取的。你的位置剛好能看見兩種不同的世界。'},
  {min:10, max:14, name:'資源豐富的起點 🌳', desc:'你成長在相對充裕的環境，許多你視為理所當然的條件並非人人都有。這份認識，是很重要的起步。'},
  {min:15, max:20, name:'高度優勢的起點 🚀', desc:'你擁有許多結構性優勢，這些資源為你打開了很多門。理解這件事，不是為了愧疚，而是為了選擇如何善用它。'},
];

const reflectQs = [
  '量表中哪一題讓你最意外？是你原本以為「人人都有」，還是「只有少數人才有」的？',
  '反向題有沒有勾選到？如果有，那個經歷對你來說感覺是什麼？',
  '如果你的同學分數和你差很多（無論高或低），你覺得這代表什麼？不代表什麼？',
  '你現在擁有的哪一項資源，你最想讓更多人也能擁有？你能怎麼做？',
];

const allItems = cats.flatMap(c => c.items);
const posItems = allItems.filter(i => !i.rev);
const revItems = allItems.filter(i => i.rev);
const TOTAL = allItems.length;

/* ══════════════════════════════
   STATE
══════════════════════════════ */
const answered = {}; // id -> true (checked) | false (explicit no, via second click)
/* ══════════════════════════════
   BUILD QUIZ
══════════════════════════════ */
function buildQuiz() {
  const body = document.getElementById('quizBody');
  cats.forEach((cat, ci) => {
    const sec = document.createElement('div');
    sec.className = `category ${cat.theme}`;

    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.innerHTML = `<div class="cat-pill">${cat.icon} ${cat.name}</div><div class="cat-count" id="cc${ci}"></div>`;
    sec.appendChild(hdr);

    cat.items.forEach(it => {
      const div = document.createElement('div');
      div.className = 'item';
      div.id = 'item-' + it.id;
      div.innerHTML = `
        <div class="cb-wrap"><svg class="ck" viewBox="0 0 14 11"><path d="M1.5 5.5L5.5 9.5L12.5 1.5"/></svg></div>
        <div class="item-emoji">${it.e}</div>
        <div class="item-text">${it.t}</div>
        <div class="item-num">${it.rev ? '' : it.id}</div>`;
      div.addEventListener('click', () => toggleItem(it.id, div, cat.items, ci));
      sec.appendChild(div);
    });
    body.appendChild(sec);
  });
}

/* ══════════════════════════════
   TOGGLE — click cycles: unchecked → checked → unchecked
   First interaction marks item as "answered" regardless of checked state.
   We store answered[id] = true (checked) or answered[id] = false (unchecked-but-touched)
══════════════════════════════ */
function toggleItem(id, el, items, ci) {
  const wasChecked = el.classList.contains('checked');
  if (wasChecked) {
    el.classList.remove('checked');
    delete answered[id];
  } else {
    el.classList.add('checked');
    answered[id] = true;
    el.classList.remove('pop-anim'); void el.offsetWidth; el.classList.add('pop-anim');
  }
  const done = items.filter(it => answered[it.id]).length;
  const cc = document.getElementById('cc'+ci);
  if(cc) cc.textContent = done > 0 ? `✅ ${done} 項` : '';
  updateProgress();
}

function updateProgress() {
  const checked = Object.keys(answered).length;
  const score = posItems.filter(it => answered[it.id]).length;
  const pct = Math.round(checked / TOTAL * 100);
  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barText').textContent = '已勾選 ' + checked + ' 項';
  document.getElementById('abBadge').textContent = '✨ ' + score + ' 分';
}

/* ══════════════════════════════
   SUBMIT
══════════════════════════════ */
function openConfirm() {
  const count = Object.keys(answered).length;
  document.getElementById('confirmCount').textContent = count;
  document.getElementById('confirmBg').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmBg').classList.remove('open');
}
function confirmSubmit() {
  closeConfirm();
  trySubmit();
}
function trySubmit() {
  const score = posItems.filter(it => answered[it.id]).length;
  const revChecked = new Set(revItems.filter(it => answered[it.id]).map(it => it.id));
  const posChecked = new Set(posItems.filter(it => answered[it.id]).map(it => it.id));
  renderResult(score, posChecked, revChecked);
}

/* ══════════════════════════════
   RENDER RESULT
══════════════════════════════ */
function renderResult(score, posChecked, revChecked) {
  const band = bands.find(b => score >= b.min && score <= b.max);
  document.getElementById('rScore').textContent = score;
  document.getElementById('rBandName').textContent = band.name;
  document.getElementById('rBandDesc').textContent = band.desc;

  // positive grid
  const pg = document.getElementById('posGrid'); pg.innerHTML = '';
  posItems.forEach(it => {
    const yes = posChecked.has(it.id);
    const d = document.createElement('div');
    d.className = 'ri ' + (yes ? 'yes' : 'no');
    d.innerHTML = `<div class="re">${it.e}</div><div class="rt">${it.t}</div><div class="rc">${yes?'✅':'○'}</div>`;
    pg.appendChild(d);
  });

  // reverse grid
  const rg = document.getElementById('revGrid'); rg.innerHTML = '';
  revItems.forEach(it => {
    const yes = revChecked.has(it.id);
    const d = document.createElement('div');
    d.className = 'ri ' + (yes ? 'rev-yes' : 'rev-no');
    d.innerHTML = `<div class="re">${it.e}</div><div class="rt">${it.t}</div><div class="rc">${yes?'✅':'○'}</div>`;
    rg.appendChild(d);
  });

  // reflect
  const rc = document.getElementById('reflectCard'); rc.innerHTML = '';
  reflectQs.forEach((q,i) => {
    const d = document.createElement('div'); d.className = 'rq';
    d.innerHTML = `<div class="qn">${i+1}</div><div>${q}</div>`;
    rc.appendChild(d);
  });

  goPage('pageResult');
}

/* ══════════════════════════════
   NAVIGATION
══════════════════════════════ */
function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('topbar').style.display = id === 'pageQuiz' ? 'flex' : 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ══════════════════════════════
   RESET
══════════════════════════════ */
function resetAll() {
  Object.keys(answered).forEach(k => delete answered[k]);
  document.querySelectorAll('.item').forEach(el => el.classList.remove('checked','pop-anim'));
  cats.forEach((cat,ci) => {
    const cc = document.getElementById('cc'+ci);
    if(cc) cc.textContent = '';
  });
  updateProgress();
  goPage('pageQuiz');
}

/* ══════════════════════════════
   INIT
══════════════════════════════ */
buildQuiz();
updateProgress();
</script>
</body>
</html>
