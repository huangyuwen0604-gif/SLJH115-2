                                                    <div className="flex flex-col border-t md:border-t-0 pt-5 md:pt-0">
                                                        <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">人員編號</span>
                                                        <div className="flex items-center text-slate-900 font-black text-3xl">
                                                            <span>{item.id}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                {office && (
                                                    <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 flex items-center gap-3">
                                                        <div className="bg-blue-600 p-2 rounded-lg text-white shadow-sm">
                                                            <i data-lucide="map-pin" className="h-4 w-4"></i>
                                                        </div>
                                                        <div>
                                                            <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest block">試務報到地點</span>
                                                            <span className="text-blue-900 font-bold">{office}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })
                            ) : (
                                <div className="text-center py-16 bg-white rounded-[2.5rem] border border-dashed border-red-200">
                                    <p className="text-red-500 font-bold text-lg">查無此人</p>
                                    <p className="text-slate-400 text-sm">請確認姓名輸入是否正確。</p>
                                </div>
                            )}
                        </div>

                        <footer className="mt-16 text-center text-slate-400 pb-12">
                            <div className="flex flex-wrap justify-center gap-2 mb-6 opacity-60">
                                {['1-X', '2-X', '3-X', '4-X', '5-X', '6-X'].map(cat => (
                                    <span key={cat} className="px-3 py-1 bg-slate-200 rounded-lg text-[9px] font-black text-slate-600">{cat} 系列匯入完成</span>
                                ))}
                            </div>
                            <p className="text-sm font-bold text-slate-500">當前資料庫共計：129 位工作人員</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化 Lucide 圖標
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 500);
    </script>
</body>
</html>
